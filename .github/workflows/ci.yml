name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        shell: bash
        run: |
          if [ -z "${{ secrets.GOOGLE_API_KEY }}" ]; then
            echo "GOOGLE_API_KEY secret is missing!"
            exit 1
          fi

          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Verify .env file
        run: |
          pwd
          ls -la

          if [ -f .env ]; then
            echo "✅ .env file exists"
            cat .env | sed 's/=.*/=***/'
          else
            echo "❌ .env file does NOT exist"
            exit 1
          fi

      - name: Docker Compose Version
        run: docker compose version

      - name: Start Docker Compose
        run: docker compose up --build -d

      - name: Wait for FastAPI
        run: |
          timeout 60 bash -c '
            until curl -fs http://127.0.0.1:8000/rag/health; do
              echo "Waiting for FastAPI..."
              sleep 2
            done
          '

      - name: Wait for Streamlit
        run: |
          timeout 60 bash -c '
            until curl -fs http://127.0.0.1:8501; do
              echo "Waiting for Streamlit..."
              sleep 2
            done
          '

      - name: Show Docker Logs
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose
        if: always()
        run: docker compose down