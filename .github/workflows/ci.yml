name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env

      - name: Start Docker Compose
        run: docker compose up --build -d

      - name: Wait for FastAPI
        run: |
          timeout 60 bash -c '
            until curl -fs http://127.0.0.1:8000/rag/health; do
              echo "Waiting for FastAPI..."
              sleep 2
            done
          '

      - name: Wait for Streamlit
        run: |
          timeout 60 bash -c '
            until curl -fs http://127.0.0.1:8501; do
              echo "Waiting for Streamlit..."
              sleep 2
            done
          '

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Backend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push gauranshchauhan123/yt-rag-backend:latest

      - name: Push Frontend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push gauranshchauhan123/yt-rag-frontend:latest

      - name: Show Docker Logs
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose
        if: always()
        run: docker compose down