services:
  backend:
    image: yt-rag-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: yt-rag-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://backend:8000/rag/ask
    depends_on:
      - backend
    restart: unless-stopped